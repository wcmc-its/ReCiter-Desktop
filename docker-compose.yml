services:
  frontend:
    build:
      context: ./frontend
      args:
        # Next.js bakes the rewrite into the standalone server at build
        # time, so the proxy target has to be set as a build arg. The
        # frontend container reaches the backend over the docker network.
        API_INTERNAL_URL: http://api:8090
    ports:
      - "${FRONTEND_PORT:-3002}:3000"
    volumes:
      # Shared with api: the backend writes its shared-secret token to
      # ~/.reciter-desktop/api-token on first start, and the frontend's
      # /api-auth/token route reads it from the same place. Both
      # containers run as root, so this mounts at /root/.reciter-desktop.
      - auth_token:/root/.reciter-desktop
    depends_on:
      - api

  api:
    build: ./api
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./core:/app/core
      - ./features:/app/features
      - ./models:/app/models
      - ./data:/app/data
      - ./config:/app/config
      # Bundled sample CSVs live in the frontend public dir (also
      # served as static downloads). The api reads them server-side via
      # /api/researchers/load-sample to populate identity + curation
      # tables for the demo.
      - ./frontend/public/sample:/app/frontend/public/sample:ro
      - auth_token:/root/.reciter-desktop
    environment:
      - DATABASE_URL=mysql+pymysql://reciter:reciter_local@db:3306/reciter_desktop
      - PUBMED_API_KEY=${PUBMED_API_KEY:-}

  db:
    image: mariadb:11
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./api/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    environment:
      MARIADB_ROOT_PASSWORD: root_local
      MARIADB_DATABASE: reciter_desktop
      MARIADB_USER: reciter
      MARIADB_PASSWORD: reciter_local
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  auth_token:
