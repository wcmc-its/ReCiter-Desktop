services:
  frontend:
    build: ./frontend
    ports:
      - "3002:3000"
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8090

  api:
    build: ./api
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./core:/app/core
      - ./features:/app/features
      - ./models:/app/models
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - DATABASE_URL=mysql+pymysql://reciter:reciter_local@db:3306/reciter_desktop
      - PUBMED_API_KEY=${PUBMED_API_KEY:-}

  db:
    image: mariadb:11
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./api/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    environment:
      MARIADB_ROOT_PASSWORD: root_local
      MARIADB_DATABASE: reciter_desktop
      MARIADB_USER: reciter
      MARIADB_PASSWORD: reciter_local
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
